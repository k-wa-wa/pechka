apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: etl-bluray
  namespace: pechka
spec:
  arguments:
    parameters:
      - name: db-host
        value: "postgres"

  volumes:
    - name: bluray-dev
      hostPath:
        path: /dev/sr1
        type: BlockDevice

  templates:
    # --- Entrypoint 1: Auto Extract & Ingestion ---
    - name: auto
      dag:
        tasks:
          - name: extract-mkv
            template: extract-mkv
          - name: ingest
            dependencies: [extract-mkv]
            when: "'{{tasks.extract-mkv.outputs.parameters.bluray-label}}' != ''"
            template: ingest-flow
            arguments:
              parameters:
                - name: disc-label
                  value: "{{tasks.extract-mkv.outputs.parameters.bluray-label}}"
                - name: mkv-files-json
                  value: "{{tasks.extract-mkv.outputs.parameters.mkv-files-json}}"
                - name: content-title
                  value: ""
                - name: short-id
                  value: "{{tasks.extract-mkv.outputs.parameters.short-id}}"

    # --- Entrypoint 2: Manual Ingestion (from existing MKVs) ---
    - name: manual
      inputs:
        parameters:
          - name: disc-label
          - name: content-title
            value: ""
      dag:
        tasks:
          - name: scan-mkv
            template: scan-mkv
            arguments:
              parameters:
                - name: label
                  value: "{{inputs.parameters.disc-label}}"
          - name: ingest
            dependencies: [scan-mkv]
            template: ingest-flow
            arguments:
              parameters:
                - name: disc-label
                  value: "{{inputs.parameters.disc-label}}"
                - name: mkv-files-json
                  value: "{{tasks.scan-mkv.outputs.parameters.mkv-files-json}}"
                - name: content-title
                  value: "{{inputs.parameters.content-title}}"
                - name: short-id
                  value: "{{tasks.scan-mkv.outputs.parameters.short-id}}"

    # --- Shared Ingestion Flow (Transcode -> Load -> Thumbnail/Refresh) ---
    - name: ingest-flow
      inputs:
        parameters:
          - name: disc-label
          - name: mkv-files-json
          - name: content-title
            value: ""
          - name: short-id
      dag:
        tasks:
          - name: transcode
            when: "{{inputs.parameters.mkv-files-json}} != '[]'"
            withParam: "{{inputs.parameters.mkv-files-json}}"
            template: transcode-mkv-parallel
            arguments:
              parameters:
                - name: mkv-path
                  value: "{{item.mkv-path}}"
                - name: label
                  value: "{{item.label}}"
                - name: title
                  value: "{{item.title}}"
                - name: short-id
                  value: "{{inputs.parameters.short-id}}"
          - name: load
            dependencies: [transcode]
            when: "{{inputs.parameters.mkv-files-json}} != '[]'"
            template: load-hls
            arguments:
              parameters:
                - name: label
                  value: "{{inputs.parameters.disc-label}}"
                - name: content-title
                  value: "{{inputs.parameters.content-title}}"
                - name: short-id
                  value: "{{inputs.parameters.short-id}}"
          - name: thumbnail
            dependencies: [load]
            withParam: "{{inputs.parameters.mkv-files-json}}"
            template: generate-thumbnail
            arguments:
              parameters:
                - name: mkv-path
                  value: "{{item.mkv-path}}"
                - name: content-id
                  value: "{{tasks.load.outputs.parameters.content-id}}"
                - name: short-id
                  value: "{{inputs.parameters.short-id}}"
          - name: refresh
            dependencies: [load]
            template: refresh-playlist

    # --- Reusable Task Templates ---

    # 1. extract-mkv (Runs on host with physical Blu-ray drive)
    - name: extract-mkv
      nodeSelector:
        bluray-disk-device: "true"
      container:
        image: ghcr.io/k-wa-wa/pechka/etl-extract:latest
        command: ["/usr/local/bin/extract"]
        securityContext:
          privileged: true
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: "2"
            memory: 2Gi
        env:
          - name: DEVICE
            value: /dev/sr1
          - name: LOCAL_MKV_DIR
            value: /mnt/mkv
          - name: MINIO_BUCKET
            valueFrom:
              configMapKeyRef:
                name: pechka-config
                key: minio-bucket
          - name: MINIO_URL
            valueFrom:
              configMapKeyRef:
                name: pechka-config
                key: minio-url
          - name: MINIO_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: pechka-minio
                key: access-key
          - name: MINIO_SECRET_KEY
            valueFrom:
              secretKeyRef:
                name: pechka-minio
                key: secret-key
          - name: DB_HOST
            value: "{{workflow.parameters.db-host}}"
          - name: DB_PORT
            value: "5432"
          - name: DB_USER
            valueFrom:
              secretKeyRef:
                name: postgres-credentials
                key: user
          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: postgres-credentials
                key: password
          - name: DB_NAME
            valueFrom:
              secretKeyRef:
                name: postgres-credentials
                key: database
          - name: SSL_MODE
            value: disable
        volumeMounts:
          - name: local-mkv
            mountPath: /mnt/mkv
          - name: bluray-dev
            mountPath: /dev/sr1
      volumes:
        - name: local-mkv
          emptyDir: {}
      outputs:
        parameters:
          - name: bluray-label
            valueFrom:
              path: /tmp/bluray-label
          - name: mkv-files-json
            valueFrom:
              path: /tmp/mkv-files.json
          - name: short-id
            valueFrom:
              path: /tmp/short-id

    # 2. scan-mkv (Scans existing MKVs on NFS, runs on any node)
    - name: scan-mkv
      inputs:
        parameters:
          - name: label
      container:
        image: ghcr.io/k-wa-wa/pechka/etl-extract:latest
        command: ["/usr/local/bin/extract"]
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        env:
          - name: DISC_LABEL
            value: "{{inputs.parameters.label}}"
          - name: LOCAL_MKV_DIR
            value: /mnt/mkv
          - name: MINIO_BUCKET
            valueFrom:
              configMapKeyRef:
                name: pechka-config
                key: minio-bucket
          - name: MINIO_URL
            valueFrom:
              configMapKeyRef:
                name: pechka-config
                key: minio-url
          - name: MINIO_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: pechka-minio
                key: access-key
          - name: MINIO_SECRET_KEY
            valueFrom:
              secretKeyRef:
                name: pechka-minio
                key: secret-key
          - name: DB_HOST
            value: "{{workflow.parameters.db-host}}"
          - name: DB_PORT
            value: "5432"
          - name: DB_USER
            valueFrom:
              secretKeyRef:
                name: postgres-credentials
                key: user
          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: postgres-credentials
                key: password
          - name: DB_NAME
            valueFrom:
              secretKeyRef:
                name: postgres-credentials
                key: database
          - name: SSL_MODE
            value: disable
      outputs:
        parameters:
          - name: mkv-files-json
            valueFrom:
              path: /tmp/mkv-files.json
          - name: short-id
            valueFrom:
              path: /tmp/short-id

    # 3. transcode-mkv-parallel (Spawns video & audio transcode steps)
    - name: transcode-mkv-parallel
      inputs:
        parameters:
          - name: mkv-path
          - name: label
          - name: title
          - name: short-id
      steps:
        - - name: run-transcode
            template: transcode-mkv
            arguments:
              parameters:
                - name: mkv-path
                  value: "{{inputs.parameters.mkv-path}}"
                - name: label
                  value: "{{inputs.parameters.label}}"
                - name: mode
                  value: "{{item}}"
                - name: short-id
                  value: "{{inputs.parameters.short-id}}"
            withItems:
              - video
              - audio

    # 4. transcode-mkv (Underlying transcode operation)
    - name: transcode-mkv
      inputs:
        parameters:
          - name: mkv-path
          - name: label
          - name: mode
          - name: short-id
      container:
        image: ghcr.io/k-wa-wa/pechka/etl-transform:latest
        command: ["/usr/local/bin/transform"]
        args:
          - "to-hls"
          - "-input"
          - "{{inputs.parameters.mkv-path}}"
          - "-output"
          - "/tmp/transcode"
          - "-mode"
          - "{{inputs.parameters.mode}}"
          - "-short-id"
          - "{{inputs.parameters.short-id}}"
        resources:
          requests:
            cpu: 1500m
            memory: 2Gi
          limits:
            cpu: "3"
            memory: 4Gi
        env:
          - name: MINIO_BUCKET
            valueFrom:
              configMapKeyRef:
                name: pechka-config
                key: minio-bucket
          - name: MINIO_URL
            valueFrom:
              configMapKeyRef:
                name: pechka-config
                key: minio-url
          - name: MINIO_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: pechka-minio
                key: access-key
          - name: MINIO_SECRET_KEY
            valueFrom:
              secretKeyRef:
                name: pechka-minio
                key: secret-key
        volumeMounts:
          - name: transcode-temp
            mountPath: /tmp/transcode
      volumes:
        - name: transcode-temp
          emptyDir: {}
      
    # 5. load-hls (Uploads HLS and registers to database)
    - name: load-hls
      inputs:
        parameters:
          - name: label
          - name: content-title
          - name: short-id
      container:
        image: ghcr.io/k-wa-wa/pechka/etl-load:latest
        command: ["/usr/local/bin/nfs-importer"]
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: "1"
            memory: 1Gi
        env:
          - name: SHORT_ID
            value: "{{inputs.parameters.short-id}}"
          - name: DISC_LABEL
            value: "{{inputs.parameters.label}}"
          - name: CONTENT_TITLE
            value: "{{inputs.parameters.content-title}}"
          - name: CONTENT_TYPE
            value: video
          - name: MINIO_BUCKET
            valueFrom:
              configMapKeyRef:
                name: pechka-config
                key: minio-bucket
          - name: MINIO_URL
            valueFrom:
              configMapKeyRef:
                name: pechka-config
                key: minio-url
          - name: MINIO_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: pechka-minio
                key: access-key
          - name: MINIO_SECRET_KEY
            valueFrom:
              secretKeyRef:
                name: pechka-minio
                key: secret-key
          - name: DB_HOST
            value: "{{workflow.parameters.db-host}}"
          - name: DB_PORT
            value: "5432"
          - name: DB_USER
            valueFrom:
              secretKeyRef:
                name: postgres-credentials
                key: user
          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: postgres-credentials
                key: password
          - name: DB_NAME
            valueFrom:
              secretKeyRef:
                name: postgres-credentials
                key: database
          - name: SSL_MODE
            value: disable
      outputs:
        parameters:
          - name: content-id
            valueFrom:
              path: /tmp/content-id
          - name: short-id
            valueFrom:
              path: /tmp/short-id

    # 6. generate-thumbnail (Generates thumbnails for content)
    - name: generate-thumbnail
      inputs:
        parameters:
          - name: mkv-path
          - name: content-id
          - name: short-id
      container:
        image: ghcr.io/k-wa-wa/pechka/etl-thumbnail:latest
        command: ["python", "analyze.py"]
        args:
          - "--input"
          - "{{inputs.parameters.mkv-path}}"
          - "--short-id"
          - "{{inputs.parameters.short-id}}"
          - "--content-id"
          - "{{inputs.parameters.content-id}}"
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: "2"
            memory: 1Gi
        env:
          - name: MINIO_BUCKET
            valueFrom:
              configMapKeyRef:
                name: pechka-config
                key: minio-bucket
          - name: MINIO_URL
            valueFrom:
              configMapKeyRef:
                name: pechka-config
                key: minio-url
          - name: MINIO_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: pechka-minio
                key: access-key
          - name: MINIO_SECRET_KEY
            valueFrom:
              secretKeyRef:
                name: pechka-minio
                key: secret-key
          - name: POSTGRES_DSN
            valueFrom:
              secretKeyRef:
                name: pechka-postgres
                key: dsn

    # 7. refresh-playlist (Refreshes final playback playlist)
    - name: refresh-playlist
      container:
        image: ghcr.io/k-wa-wa/pechka/etl-refresh-latest-playlist:latest
        command: ["/usr/local/bin/refresh-latest-playlist"]
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        env:
          - name: MINIO_BUCKET
            valueFrom:
              configMapKeyRef:
                name: pechka-config
                key: minio-bucket
          - name: MINIO_URL
            valueFrom:
              configMapKeyRef:
                name: pechka-config
                key: minio-url
          - name: MINIO_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: pechka-minio
                key: access-key
          - name: MINIO_SECRET_KEY
            valueFrom:
              secretKeyRef:
                name: pechka-minio
                key: secret-key
          - name: DB_HOST
            value: "{{workflow.parameters.db-host}}"
          - name: DB_PORT
            value: "5432"
          - name: DB_USER
            valueFrom:
              secretKeyRef:
                name: postgres-credentials
                key: user
          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: postgres-credentials
                key: password
          - name: DB_NAME
            valueFrom:
              secretKeyRef:
                name: postgres-credentials
                key: database
          - name: SSL_MODE
            value: disable

---
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: etl-bluray-cron
  namespace: pechka
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  workflowSpec:
    entrypoint: auto
    workflowTemplateRef:
      name: etl-bluray
