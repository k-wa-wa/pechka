apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: pechka
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provider
  namespace: pechka
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: default
        folder: pechka
        type: file
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-api
  namespace: pechka
data:
  api.json: |
    {
      "title": "pechka API",
      "uid": "pechka-api",
      "schemaVersion": 38,
      "panels": [
        {
          "type": "timeseries",
          "title": "HTTP Request Rate",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "targets": [{
            "expr": "sum(rate(pechka_api_requests_total[1m])) by (method, uri, status)",
            "legendFormat": "{{method}} {{uri}} {{status}}"
          }]
        },
        {
          "type": "timeseries",
          "title": "HTTP Request Latency (p50/p90/p99)",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(pechka_api_request_duration_seconds_bucket[1m])) by (le))",
              "legendFormat": "p50"
            },
            {
              "expr": "histogram_quantile(0.90, sum(rate(pechka_api_request_duration_seconds_bucket[1m])) by (le))",
              "legendFormat": "p90"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(pechka_api_request_duration_seconds_bucket[1m])) by (le))",
              "legendFormat": "p99"
            }
          ]
        },
        {
          "type": "stat",
          "title": "Error Rate (5xx)",
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 8},
          "targets": [{
            "expr": "sum(rate(pechka_api_requests_total{status=~\"5..\"}[5m])) / sum(rate(pechka_api_requests_total[5m]))",
            "legendFormat": "error rate"
          }]
        }
      ]
    }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-pvc
  namespace: pechka
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: pechka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.6.1
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-secret
                  key: ADMIN_PASSWORD
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: Viewer
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboards-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
            - name: data
              mountPath: /var/lib/grafana
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboards-provider
          configMap:
            name: grafana-dashboards-provider
        - name: dashboards
          configMap:
            name: grafana-dashboard-api
        - name: data
          persistentVolumeClaim:
            claimName: grafana-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: pechka
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
