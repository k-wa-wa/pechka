apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: pechka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      serviceAccountName: api-sa
      containers:
        - name: api
          image: ghcr.io/k-wa-wa/pechka-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: POSTGRES_DSN
            - name: MONGO_URL
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: MONGO_URL
            - name: MONGO_DB
              value: pechka
            - name: ELASTICSEARCH_URL
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: ELASTICSEARCH_URL
            - name: ALLOWED_IP_RANGE
              valueFrom:
                configMapKeyRef:
                  name: pechka-config
                  key: allowed-ip-range
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: pechka
spec:
  selector:
    app: api
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: api-sa
  namespace: pechka
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: api-workflow-creator
  namespace: pechka
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["workflows"]
    verbs: ["create", "get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: api-workflow-creator-binding
  namespace: pechka
subjects:
  - kind: ServiceAccount
    name: api-sa
    namespace: pechka
roleRef:
  kind: Role
  name: api-workflow-creator
  apiGroup: rbac.authorization.k8s.io
