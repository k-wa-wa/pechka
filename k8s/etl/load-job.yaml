apiVersion: batch/v1
kind: Job
metadata:
  # Name format: nfs-import-<disc-label>
  name: nfs-import-placeholder
  namespace: pechka
  labels:
    app: nfs-importer
    phase: etl-load
spec:
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      containers:
        - name: nfs-importer
          image: ghcr.io/k-wa-wa/pechka/etl-load:latest
          env:
            - name: NFS_HLS_DIR
              value: /mnt/nfs/hls
            - name: DISC_LABEL
              value: ""
            - name: CONTENT_TITLE
              value: ""
            - name: CONTENT_TYPE
              value: video
            - name: IS_360
              value: "false"
            - name: MINIO_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: pechka-config
                  key: minio-bucket
            - name: MINIO_URL
              valueFrom:
                configMapKeyRef:
                  name: pechka-config
                  key: minio-url
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: pechka-minio
                  key: access-key
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: pechka-minio
                  key: secret-key
            - name: POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: pechka-postgres
                  key: dsn
          volumeMounts:
            - name: nfs-hls
              mountPath: /mnt/nfs/hls
              readOnly: true
      volumes:
        - name: nfs-hls
          nfs:
            server: "${NFS_SERVER}"
            path: /hls
      restartPolicy: Never
  backoffLimit: 2
