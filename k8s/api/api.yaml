apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: pechka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: ghcr.io/k-wa-wa/pechka-api:latest
          ports:
            - containerPort: 8080
          env:
            - name: POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: POSTGRES_DSN
            - name: MONGO_URL
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: MONGO_URL
            - name: MONGO_DB
              value: stream
            - name: ELASTICSEARCH_URL
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: ELASTICSEARCH_URL
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: pechka
spec:
  selector:
    app: api
  ports:
    - port: 8080
      targetPort: 8080
