apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: pechka
data:
  nginx.conf: |
    worker_processes auto;

    events {
      worker_connections 1024;
    }

    http {
      include       /etc/nginx/mime.types;
      default_type  application/octet-stream;

      # TS セグメント: 不変コンテンツ → 1年キャッシュ
      proxy_cache_path /var/cache/nginx/ts
        levels=1:2 keys_zone=ts_cache:10m max_size=10g inactive=365d use_temp_path=off;

      # HLS マニフェスト: 頻繁に更新される → 30秒キャッシュ
      proxy_cache_path /var/cache/nginx/m3u8
        levels=1:2 keys_zone=m3u8_cache:1m max_size=100m inactive=60s use_temp_path=off;

      # サムネイル: 変更頻度低 → 1週間キャッシュ
      proxy_cache_path /var/cache/nginx/thumbs
        levels=1:2 keys_zone=thumb_cache:5m max_size=5g inactive=7d use_temp_path=off;

      log_format json_combined escape=json
        '{"time":"$time_iso8601",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"bytes_sent":$bytes_sent,'
        '"request_time":$request_time,'
        '"cache_status":"$upstream_cache_status",'
        '"remote_addr":"$remote_addr"}';

      access_log /var/log/nginx/access.log json_combined;
      error_log  /var/log/nginx/error.log warn;

      server {
        listen 80;

        # HLS TS セグメント
        location ~* \.ts$ {
          proxy_pass         http://minio:9000;
          proxy_cache        ts_cache;
          proxy_cache_valid  200 365d;
          proxy_cache_use_stale error timeout updating;
          proxy_cache_background_update on;
          add_header Cache-Control "public, max-age=31536000, immutable";
          add_header X-Cache-Status $upstream_cache_status;
        }

        # HLS マニフェスト
        location ~* \.m3u8$ {
          proxy_pass         http://minio:9000;
          proxy_cache        m3u8_cache;
          proxy_cache_valid  200 30s;
          proxy_cache_use_stale error timeout;
          add_header Cache-Control "public, max-age=30";
          add_header X-Cache-Status $upstream_cache_status;
        }

        # サムネイル
        location /thumbnails/ {
          proxy_pass         http://minio:9000;
          proxy_cache        thumb_cache;
          proxy_cache_valid  200 7d;
          proxy_cache_use_stale error timeout updating;
          proxy_cache_background_update on;
          add_header Cache-Control "public, max-age=604800";
          add_header X-Cache-Status $upstream_cache_status;
        }

        # MinIO resources (HLS 等の直接配信パス)
        location /resources/ {
          proxy_pass         http://minio:9000;
          proxy_set_header   Host minio:9000;
          proxy_set_header   X-Real-IP $remote_addr;
        }

        # API
        location /api/ {
          proxy_pass         http://api:8080/;
          proxy_set_header   Host $host;
          proxy_set_header   X-Real-IP $remote_addr;
          proxy_set_header   X-Request-ID $request_id;
        }

        # ヘルスチェック
        location /health {
          return 200 "ok";
          add_header Content-Type text/plain;
        }

        # フロントエンド (default)
        location / {
          proxy_pass         http://frontend:3000;
          proxy_set_header   Host $host;
          proxy_set_header   X-Real-IP $remote_addr;
          proxy_set_header   Upgrade $http_upgrade;
          proxy_set_header   Connection "upgrade";
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: pechka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
      annotations:
        prometheus.io/scrape: "false"
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: cache
              mountPath: /var/cache/nginx
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: nginx-config
        - name: cache
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: pechka
spec:
  selector:
    app: nginx
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
