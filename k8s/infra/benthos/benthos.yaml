apiVersion: v1
kind: ConfigMap
metadata:
  name: benthos-streams
  namespace: pechka
data:
  contents.yaml: |
    http:
      enabled: true
      address: "0.0.0.0:4195"

    logger:
      level: INFO
      format: json

    metrics:
      prometheus:
        use_histogram_timing: true

    input:
      postgres_cdc:
        dsn: "${POSTGRES_DSN}"
        slot_name: benthos_slot
        snapshot: true
        tables:
          - public.contents
          - public.video_variants
          - public.assets
          - public.discs

    pipeline:
      processors:
        - branch:
            request_map: |
              root = if this.table == "contents" { this } else { deleted() }
            processors:
              - mapping: |
                  let op  = this.operation
                  let row = this.after | this.before
                  root._id              = $row.short_id
                  root.short_id         = $row.short_id
                  root.content_type     = $row.content_type
                  root.title            = $row.title
                  root.description      = $row.description
                  root.duration_seconds = $row.duration_seconds
                  root.is_360           = $row.is_360
                  root.tags             = $row.tags
                  root.status           = $row.status
                  root.published_at     = $row.published_at
                  root.updated_at       = $row.updated_at
                  root._deleted         = $op == "delete"

    output:
      fallback:
        - retry:
            max_retries: 5
            backoff:
              initial_interval: 1s
              max_interval: 30s
              max_elapsed_time: 5m
            output:
              broker:
                pattern: fan_out
                outputs:
                  - mongodb:
                      url: "${MONGO_URL}"
                      database: pechka
                      collection: contents
                      operation: update-one
                      upsert: true
                      filter_map: 'root = {"_id": this._id}'
                      document_map: |
                        root = if this._deleted {
                          {"$set": {"status": "deleted"}}
                        } else {
                          {"$set": this.without("_deleted")}
                        }
                  - elasticsearch:
                      urls:
                        - "${ELASTICSEARCH_URL}"
                      index: pechka_contents
                      id: '${! json("short_id") }'
                      action: index
        - log:
            level: ERROR
            message: "CDC write failed after retries: ${! error() } | msg: ${! content() }"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: benthos
  namespace: pechka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: benthos
  template:
    metadata:
      labels:
        app: benthos
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "4195"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: benthos
          image: ghcr.io/redpanda-data/connect:latest
          args:
            - streams
            - /streams/contents.yaml
          envFrom:
            - secretRef:
                name: benthos-secret
          ports:
            - containerPort: 4195
              name: http
          volumeMounts:
            - name: streams
              mountPath: /streams
          livenessProbe:
            httpGet:
              path: /ping
              port: 4195
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 4195
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        - name: streams
          configMap:
            name: benthos-streams
---
apiVersion: v1
kind: Service
metadata:
  name: benthos
  namespace: pechka
spec:
  selector:
    app: benthos
  ports:
    - port: 4195
      targetPort: 4195
      name: http
