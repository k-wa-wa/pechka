apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: pechka

resources:
  - ../../base
  - secrets.yaml
  - tmp/postgres
  - tmp/minio
  - ingress.yaml

patches:
  - path: workflow-patch.yaml
  - path: pvc-local-path-patch.yaml


generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: pechka-config
    namespace: pechka
    literals:
      - minio-bucket=pechka
      - minio-url=minio:9000
      - allowed-ip-range=10.0.0.0/8
