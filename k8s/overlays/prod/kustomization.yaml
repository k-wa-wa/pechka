apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - ../../base/infra
  - ../../base/api
  - ../../base/frontend
  - ../../base/etl
  - minio
  - ingress.yaml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: pechka-config
    namespace: pechka
    literals:
      - minio-bucket=pechka
      - minio-url=minio:9000

images:
  - name: ghcr.io/k-wa-wa/pechka-api
    newTag: v1.0.0
  - name: ghcr.io/k-wa-wa/pechka-frontend
    newTag: v1.0.0

patches:
  # ETL Jobs: suspend on deploy (triggered manually)
  - patch: |
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: bluray-extract
      spec:
        suspend: true
    target:
      kind: Job
      name: bluray-extract

  - patch: |
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: transcode-placeholder
      spec:
        suspend: true
    target:
      kind: Job
      name: transcode-placeholder

  - patch: |
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: load-hls-placeholder
      spec:
        suspend: true
    target:
      kind: Job
      name: load-hls-placeholder

  - patch: |
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: refresh-latest-playlist
      spec:
        suspend: true
    target:
      kind: Job
      name: refresh-latest-playlist

  - patch: |
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: thumbnail-placeholder
      spec:
        suspend: true
        template:
          spec:
            volumes:
              - name: nfs-mkv
                nfs:
                  server: 192.168.5.151
                  path: /mkv
    target:
      kind: Job
      name: thumbnail-placeholder
