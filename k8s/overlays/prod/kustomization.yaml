apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: pechka

resources:
  - ../../base
  - nfs-pv.yaml
  - secrets.yaml
  - tmp/postgres
  - tmp/minio

patches:
  - path: workflow-patch.yaml
  - path: nfs-pvc-patch.yaml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: pechka-config
    namespace: pechka
    literals:
      - minio-bucket=pechka
      - minio-url=minio:9000

