apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - ../../base/infra
  - ../../base/api
  - ../../base/frontend
  - ../../base/etl
  - minio
  - ingress.yaml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: pechka-config
    namespace: pechka
    literals:
      - minio-bucket=pechka
      - minio-url=minio:9000

images:
  - name: ghcr.io/k-wa-wa/pechka-api
    newTag: v1.0.0
  - name: ghcr.io/k-wa-wa/pechka-frontend
    newTag: v1.0.0
