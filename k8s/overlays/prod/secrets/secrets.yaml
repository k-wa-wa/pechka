apiVersion: v1
kind: Secret
metadata:
  name: mongodb-secret
  namespace: pechka
type: Opaque
stringData:
  MONGO_INITDB_ROOT_USERNAME: <path:k8s/overlays/prod/secrets/prod-secrets.yaml#MONGO_INITDB_ROOT_USERNAME>
  MONGO_INITDB_ROOT_PASSWORD: <path:k8s/overlays/prod/secrets/prod-secrets.yaml#MONGO_INITDB_ROOT_PASSWORD>
  MONGO_INITDB_DATABASE: <path:k8s/overlays/prod/secrets/prod-secrets.yaml#MONGO_INITDB_DATABASE>
---
