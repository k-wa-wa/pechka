apiVersion: batch/v1
kind: Job
metadata:
  name: minio-setup
  namespace: pechka
spec:
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-minio
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until wget -q -O- http://minio:9000/minio/health/live; do
                echo "Waiting for MinIO..."
                sleep 5
              done
      containers:
        - name: mc
          image: quay.io/minio/mc:RELEASE.2024-06-18T18-51-29Z
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: MINIO_ROOT_PASSWORD
          command:
            - sh
            - -c
            - |
              mc alias set pechka http://minio:9000 $MINIO_ROOT_USER $MINIO_ROOT_PASSWORD
              mc mb --ignore-existing pechka/pechka
              mc anonymous set download pechka/pechka/resources/hls
              echo "MinIO setup complete"
