apiVersion: batch/v1
kind: Job
metadata:
  name: minio-setup
  namespace: pechka
spec:
  ttlSecondsAfterFinished: 100
  template:
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
        - name: wait-for-minio
          image: busybox:1.36
          env:
            - name: MINIO_URL
              valueFrom:
                configMapKeyRef:
                  name: pechka-config
                  key: minio-url
          command:
            - sh
            - -c
            - |
              until wget -q -O- http://$MINIO_URL/minio/health/live; do
                echo "Waiting for MinIO..."
                sleep 5
              done
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
      containers:
        - name: mc
          image: quay.io/minio/mc:RELEASE.2024-06-18T18-51-29Z
          env:
            - name: MINIO_URL
              valueFrom:
                configMapKeyRef:
                  name: pechka-config
                  key: minio-url
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: MINIO_ROOT_PASSWORD
            - name: MC_HOST_pechka
              value: http://$(MINIO_ROOT_USER):$(MINIO_ROOT_PASSWORD)@$(MINIO_URL)
          command:
            - sh
            - -c
            - |
              mc mb --ignore-existing pechka/pechka
              # HLS content is publicly served for video playback - anonymous download is intentional
              mc anonymous set download pechka/pechka/resources/hls
              echo "MinIO setup complete"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
