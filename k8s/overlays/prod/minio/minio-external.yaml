apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: pechka
spec:
  ports:
    - name: api
      port: 9000
      targetPort: 9000
---
apiVersion: v1
kind: Endpoints
metadata:
  name: minio
  namespace: pechka
subsets:
  - addresses:
      - ip: 192.168.5.151
    ports:
      - name: api
        port: 9000
