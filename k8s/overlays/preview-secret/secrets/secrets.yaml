# k8s/overlays/prod/secrets/secrets.yaml と同じ形式 (argocd-vault-plugin の <path:...#KEY> 参照)。
# 実値は同ディレクトリの preview-seed-secrets.yaml (SOPS暗号化) から取得する。
apiVersion: v1
kind: Secret
metadata:
  name: postgres-seed-secret
type: Opaque
stringData:
  DB_NAME: <path:secrets/preview-seed-secrets.yaml#DB_NAME>
  DB_USER: <path:secrets/preview-seed-secrets.yaml#DB_USER>
  DB_PASSWORD: <path:secrets/preview-seed-secrets.yaml#DB_PASSWORD>
