resources:
  - ../../base/infra
  - ../../base/api
  - ../../base/frontend
  - ../../base/etl
  - postgres
  - minio
  - secrets.yaml
  - etl-pvc.yaml
  - etl-importer-pod.yaml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: pechka-config
    namespace: pechka
    literals:
      - minio-bucket=pechka
      - minio-url=minio:9000

patches:
  - target:
      kind: Job
      name: bluray-extract
    patch: |
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: bluray-extract
      spec:
        suspend: true
        template:
          spec:
            containers:
              - name: makemkv
                imagePullPolicy: IfNotPresent
                env:
                  - name: DB_HOST
                    value: postgres
  - target:
      kind: Job
      name: transcode-placeholder
    patch: |
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: transcode-placeholder
      spec:
        suspend: true
        template:
          spec:
            containers:
              - name: ffmpeg
                imagePullPolicy: IfNotPresent
  - target:
      kind: Job
      name: load-hls-placeholder
    patch: |
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: load-hls-placeholder
      spec:
        suspend: true
        template:
          spec:
            containers:
              - name: data-importer
                imagePullPolicy: IfNotPresent
                env:
                  - name: DB_HOST
                    value: postgres
            volumes:
              - name: nfs-hls
                persistentVolumeClaim:
                  claimName: nfs-hls-pvc
  - target:
      kind: Job
      name: thumbnail-placeholder
    patch: |
      - op: replace
        path: /spec/template/spec/volumes/0
        value:
          name: nfs-mkv
          persistentVolumeClaim:
            claimName: nfs-bluray-pvc
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: IfNotPresent
      - op: add
        path: /spec/template/spec/containers/0/volumeMounts/0/subPath
        value: mkv
      - op: add
        path: /spec/suspend
        value: true
  - target:
      kind: Job
      name: refresh-latest-playlist
    patch: |
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: refresh-latest-playlist
      spec:
        suspend: true
        template:
          spec:
            containers:
              - name: refresh-latest-playlist
                imagePullPolicy: IfNotPresent
                env:
                  - name: DB_HOST
                    value: postgres
