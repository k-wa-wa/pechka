resources:
  - ../../base/infra
  - ../../base/api
  - ../../base/frontend
  - ../../base/etl
  - postgres
  - minio
  - secrets.yaml
  - etl-pvc.yaml
  - etl-importer-pod.yaml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: pechka-config
    namespace: pechka
    literals:
      - minio-bucket=pechka
      - minio-url=minio:9000

