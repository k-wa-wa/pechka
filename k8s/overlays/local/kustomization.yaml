resources:
  - ../../base
  - postgres
  - minio
  - secrets.yaml
  - etl-importer-pod.yaml

patches:
  - path: etl-pvc.yaml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: pechka-config
    namespace: pechka
    literals:
      - minio-bucket=pechka
      - minio-url=minio:9000

