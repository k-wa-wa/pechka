apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-migrations
  namespace: pechka
data:
  001_create_tables.up.sql: |
    CREATE TABLE IF NOT EXISTS discs (
        id         UUID         PRIMARY KEY DEFAULT gen_random_uuid(),
        label      VARCHAR(255) NOT NULL UNIQUE,
        disc_name  VARCHAR(255),
        created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );

    CREATE TABLE IF NOT EXISTS contents (
        id               UUID         PRIMARY KEY DEFAULT gen_random_uuid(),
        short_id         VARCHAR(50)  UNIQUE NOT NULL,
        content_type     VARCHAR(20)  NOT NULL,
        disc_id          UUID         REFERENCES discs(id),
        title            VARCHAR(255) NOT NULL,
        description      TEXT         DEFAULT '',
        duration_seconds INTEGER,
        is_360           BOOLEAN      DEFAULT FALSE,
        tags             TEXT[]       DEFAULT '{}',
        status           VARCHAR(20)  NOT NULL,
        published_at     TIMESTAMP WITH TIME ZONE,
        created_at       TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
        updated_at       TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );

    CREATE TABLE IF NOT EXISTS video_variants (
        id           UUID         PRIMARY KEY DEFAULT gen_random_uuid(),
        content_id   UUID         NOT NULL REFERENCES contents(id) ON DELETE CASCADE,
        variant_type VARCHAR(20)  NOT NULL,
        hls_key      TEXT         NOT NULL,
        bandwidth    INTEGER,
        resolution   VARCHAR(20),
        codecs       VARCHAR(100),
        created_at   TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );

    CREATE TABLE IF NOT EXISTS assets (
        id         UUID        PRIMARY KEY DEFAULT gen_random_uuid(),
        content_id UUID        NOT NULL REFERENCES contents(id) ON DELETE CASCADE,
        asset_role VARCHAR(50) NOT NULL,
        s3_key     TEXT        NOT NULL,
        created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );

    CREATE OR REPLACE FUNCTION update_updated_at()
    RETURNS TRIGGER AS $$
    BEGIN
        NEW.updated_at = CURRENT_TIMESTAMP;
        RETURN NEW;
    END;
    $$ LANGUAGE plpgsql;

    DROP TRIGGER IF EXISTS contents_updated_at ON contents;
    CREATE TRIGGER contents_updated_at
        BEFORE UPDATE ON contents
        FOR EACH ROW
        EXECUTE FUNCTION update_updated_at();

    CREATE INDEX IF NOT EXISTS idx_contents_short_id   ON contents(short_id);
    CREATE INDEX IF NOT EXISTS idx_contents_status     ON contents(status);
    CREATE INDEX IF NOT EXISTS idx_contents_type       ON contents(content_type);
    CREATE INDEX IF NOT EXISTS idx_contents_updated_at ON contents(updated_at);
    CREATE INDEX IF NOT EXISTS idx_video_variants_content_id ON video_variants(content_id);
    CREATE INDEX IF NOT EXISTS idx_assets_content_id ON assets(content_id);
---
apiVersion: batch/v1
kind: Job
metadata:
  name: postgres-migrate
  namespace: pechka
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: postgres:16
          command:
            - sh
            - -c
            - until pg_isready -h postgres -U pechka; do echo "waiting for postgres..."; sleep 2; done
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
      containers:
        - name: migrate
          image: postgres:16
          command:
            - sh
            - -c
            - psql -h postgres -U pechka -d pechka -f /migrations/001_create_tables.up.sql
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: migrations
              mountPath: /migrations
      volumes:
        - name: migrations
          configMap:
            name: postgres-migrations
