# preview namespace 内で完結するローカルコンテナ(postgres/mongodb/benthos)向けの認証情報。
# 実データはprod由来ではなく使い捨てのpreview専用インスタンスなので、平文で問題ない
# (k8s/overlays/local/secrets.yaml と同じ考え方)。
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-secret
type: Opaque
stringData:
  MONGO_INITDB_ROOT_USERNAME: pechka
  MONGO_INITDB_ROOT_PASSWORD: changeme
  MONGO_INITDB_DATABASE: pechka
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
type: Opaque
stringData:
  POSTGRES_USER: pechka
  POSTGRES_PASSWORD: changeme
---
apiVersion: v1
kind: Secret
metadata:
  name: benthos-secret
type: Opaque
stringData:
  POSTGRES_DSN: "postgres://pechka:changeme@postgres:5432/pechka?sslmode=disable"
  MONGO_URL: "mongodb://pechka:changeme@mongodb:27017/pechka?authSource=admin&w=1"
  ELASTICSEARCH_URL: "http://elasticsearch:9200"
---
apiVersion: v1
kind: Secret
metadata:
  name: api-secret
type: Opaque
stringData:
  POSTGRES_DSN: "postgres://pechka:changeme@postgres:5432/pechka?sslmode=disable"
  MONGO_URL: "mongodb://pechka:changeme@mongodb:27017/pechka?authSource=admin&w=1"
  ELASTICSEARCH_URL: "http://elasticsearch:9200"
