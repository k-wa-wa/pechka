# minioだけはprodの実体を共有する(画像/動画データが大きく、PRごとに複製しないため)。
# nginx.conf / api は "minio" という短縮名前提のため、同名Serviceで実体に届ける。
# 実体は nuage-cluster リポジトリの external-service namespace が一元管理しているので、
# ここでは同名serviceでDNS転送するだけでよい(IPの手動同期は不要)。
apiVersion: v1
kind: Service
metadata:
  name: minio
spec:
  type: ExternalName
  externalName: minio.external-service.svc.cluster.local
