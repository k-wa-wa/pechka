# postgres-seed-from-prod Job だけが使う、prodの実postgresへの参照(初回データコピー用)。
# アプリ本体(api/frontend, k8s/overlays/preview)は自前のローカルpostgresにのみ接続し、この実体には触れない。
# 実体は nuage-cluster リポジトリの external-service namespace が一元管理しているので、
# ここでは同名serviceでDNS転送するだけでよい(IPの手動同期は不要)。
# namespaceは指定しない(destination.namespaceでPRごとのnamespaceに配置される)。
apiVersion: v1
kind: Service
metadata:
  name: postgres-prod
spec:
  type: ExternalName
  externalName: postgres.external-service.svc.cluster.local
