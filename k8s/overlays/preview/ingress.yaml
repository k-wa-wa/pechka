# host / tls は ApplicationSet の template (ArgoCDネイティブのkustomize.patches) で
# PR ごとに書き換えられる (base値はダミー)。
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pechka-ingress
  annotations:
    cert-manager.io/cluster-issuer: "ca-clusterissuer"
spec:
  ingressClassName: cilium
  tls:
    - hosts:
        - pechka-preview.cluster.wpc
      secretName: pechka-preview-tls-secret
  rules:
    - host: pechka-preview.cluster.wpc
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nginx
                port:
                  number: 80
