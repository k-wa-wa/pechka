openapi: 3.0.3
info:
  title: Streaming Service API
  version: 1.0.0
  description: API for streaming service with authentication, content management, and catalog

servers:
  - url: http://localhost:8081
    description: Auth Service
  - url: http://localhost:8080
    description: Metadata Service
  - url: http://localhost:8082
    description: Catalog Service

paths:
  # ==================== Auth Service ====================
  /api/v1/auth/session:
    get:
      summary: Exchange Cloudflare JWT for App JWT
      tags: [Auth]
      description: |
        Called from the client-side (browser) to exchange the 'Cf-Access-Jwt-Assertion' 
        header (provided by Cloudflare Access or dev-proxy) for an internal App JWT.
      responses:
        '200':
          description: Session established successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokens'
        '401':
          description: Missing or invalid Cloudflare JWT
        '500':
          description: Internal server error (e.g. user creation failed)

  # ==================== Auth Service ====================

  /api/v1/auth/me:
    get:
      summary: Get current user info
      tags: [Auth]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Current user info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401':
          description: Unauthorized

  # ==================== Metadata Service ====================
  /api/metadata/v1/admin/metadata/contents:
    get:
      summary: List all contents
      tags: [Contents]
      responses:
        '200':
          description: List of contents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Content'
        '500':
          description: Internal server error

    post:
      summary: Create a new content
      tags: [Contents]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateContentRequest'
      responses:
        '201':
          description: Content created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Content'
        '400':
          description: Invalid request

  /api/metadata/v1/admin/metadata/contents/{short_id}:
    get:
      summary: Get content by short_id
      tags: [Contents]
      parameters:
        - name: short_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Content details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Content'
        '404':
          description: Content not found

  /api/metadata/v1/admin/metadata/contents/{id}:
    put:
      summary: Update content
      tags: [Contents]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateContentRequest'
      responses:
        '200':
          description: Content updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Content'
        '400':
          description: Invalid request
        '500':
          description: Internal server error

  /api/metadata/v1/admin/metadata/contents/{id}/assets:
    post:
      summary: Add assets to content
      tags: [Contents]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddAssetsRequest'
      responses:
        '200':
          description: Assets added successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          description: Invalid request
        '500':
          description: Internal server error

  # ==================== Catalog Service ====================
  /api/catalog/v1/catalog/home:
    get:
      summary: Get home catalog
      tags: [Catalog]
      responses:
        '200':
          description: Home catalog with banners and sections
          content:
            application/json:
              schema:
                type: object
                properties:
                  banners:
                    type: array
                    items:
                      $ref: '#/components/schemas/CatalogContent'
                  sections:
                    type: array
                    items:
                      type: object
                      properties:
                        title:
                          type: string
                        items:
                          type: array
                          items:
                            $ref: '#/components/schemas/CatalogContent'
        '500':
          description: Internal server error

  /api/catalog/v1/catalog/contents/{short_id}:
    get:
      summary: Get content details by short_id
      tags: [Catalog]
      parameters:
        - name: short_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Content details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogContent'
        '404':
          description: Content not found

  /api/catalog/v1/catalog/search:
    get:
      summary: Search contents
      tags: [Catalog]
      parameters:
        - name: q
          in: query
          schema:
            type: string
        - name: tags
          in: query
          schema:
            type: string
          description: Comma-separated tag list
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CatalogContent'
        '500':
          description: Internal server error

  /api/catalog/v1/internal/catalog/sync/{short_id}:
    post:
      summary: Sync content from metadata to catalog
      tags: [Catalog]
      parameters:
        - name: short_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Sync completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
        '500':
          description: Sync failed

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # ── Auth ──────────────────────────────────────────────────────────────────
    AuthTokens:
      type: object
      properties:
        access_token:
          type: string

    MeResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        role:
          type: string
          enum: [user, admin]

    # ── Content (Metadata Service) ────────────────────────────────────────────
    VideoDetails:
      type: object
      description: Fields specific to video content (content_type = video or vr360)
      properties:
        is_360:
          type: boolean
          default: false
        duration_seconds:
          type: integer
        director:
          type: string

    CreateContentRequest:
      type: object
      required: [content_type, title]
      properties:
        content_type:
          type: string
          enum: [video, image_gallery, vr360, ebook]
        title:
          type: string
        description:
          type: string
        rating:
          type: number
          format: double
        tags:
          type: array
          items:
            type: string
        video_details:
          $ref: '#/components/schemas/VideoDetails'
          description: Required when content_type is 'video' or 'vr360'

    Content:
      type: object
      description: Unified content entity (maps to contents table)
      properties:
        id:
          type: string
          format: uuid
        short_id:
          type: string
        content_type:
          type: string
          enum: [video, image_gallery, vr360, ebook]
        title:
          type: string
        description:
          type: string
        rating:
          type: number
          format: double
        tags:
          type: array
          items:
            type: string
        published_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        video_details:
          $ref: '#/components/schemas/VideoDetails'
        assets:
          type: array
          items:
            $ref: '#/components/schemas/Asset'

    AddAssetsRequest:
      type: object
      required: [assets]
      properties:
        assets:
          type: array
          items:
            $ref: '#/components/schemas/AssetRequest'

    AssetRequest:
      type: object
      properties:
        asset_role:
          type: string
          enum: [thumbnail, hls_master, pdf]
        minio_key:
          type: string
        public_url:
          type: string

    Asset:
      type: object
      properties:
        id:
          type: string
          format: uuid
        asset_role:
          type: string
        s3_key:
          type: string
        public_url:
          type: string

    # ── Catalog (Read-side: MongoDB) ──────────────────────────────────────────
    CatalogContent:
      type: object
      description: Denormalized content document for the read-side (MongoDB)
      properties:
        id:
          type: string
        short_id:
          type: string
        type:
          type: string
          enum: [video, vr360, image_gallery, ebook]
        title:
          type: string
        description:
          type: string
        rating:
          type: number
          format: double
        metadata:
          type: object
          additionalProperties: true
          description: Type-specific metadata (e.g. director, is_360, duration_seconds for video)
        assets:
          type: object
          additionalProperties:
            type: string
          description: Map of asset_role to URL (e.g. {"hls_master": "https://..."})
        tags:
          type: array
          items:
            type: string
        updated_at:
          type: string
          format: date-time
