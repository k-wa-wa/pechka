openapi: 3.0.3
info:
  title: Streaming Service API
  version: 1.0.0
  description: API for streaming service with authentication, content management, and catalog

servers:
  - url: http://localhost:8081
    description: Auth Service
  - url: http://localhost:8080
    description: Metadata Service
  - url: http://localhost:8082
    description: Catalog Service

paths:
  # ==================== Auth Service ====================
  /api/v1/auth/register:
    post:
      summary: Register a new user
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokens'
        '400':
          description: Invalid request

  /api/v1/auth/login:
    post:
      summary: Login user
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokens'
        '401':
          description: Invalid credentials

  /api/v1/auth/refresh:
    post:
      summary: Refresh access token
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Tokens refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokens'
        '401':
          description: Invalid or expired refresh token

  /api/v1/auth/me:
    get:
      summary: Get current user info
      tags:
        - Auth
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Current user info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401':
          description: Unauthorized

  # ==================== Metadata Service ====================
  /api/metadata/v1/admin/metadata/videos:
    get:
      summary: List all videos
      tags:
        - Videos
      responses:
        '200':
          description: List of videos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Video'
        '500':
          description: Internal server error

    post:
      summary: Create a new video
      tags:
        - Videos
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateVideoRequest'
      responses:
        '201':
          description: Video created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Video'
        '400':
          description: Invalid request

  /api/metadata/v1/admin/metadata/videos/{short_id}:
    get:
      summary: Get video by short_id
      tags:
        - Videos
      parameters:
        - name: short_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Video details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Video'
        '404':
          description: Video not found

  /api/metadata/v1/admin/metadata/videos/{id}/assets:
    post:
      summary: Add assets to video
      tags:
        - Videos
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddAssetsRequest'
      responses:
        '200':
          description: Assets added successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          description: Invalid request
        '500':
          description: Internal server error

  /api/metadata/v1/admin/metadata/videos/{id}:
    put:
      summary: Update video
      tags:
        - Videos
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Video'
      responses:
        '200':
          description: Video updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Video'
        '400':
          description: Invalid request
        '500':
          description: Internal server error

  /api/metadata/v1/admin/metadata/galleries:
    get:
      summary: List all galleries
      tags:
        - Galleries
      responses:
        '200':
          description: List of galleries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Gallery'
        '500':
          description: Internal server error

    post:
      summary: Create a new gallery
      tags:
        - Galleries
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGalleryRequest'
      responses:
        '201':
          description: Gallery created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Gallery'
        '400':
          description: Invalid request

  /api/metadata/v1/admin/metadata/galleries/{short_id}:
    get:
      summary: Get gallery by short_id
      tags:
        - Galleries
      parameters:
        - name: short_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Gallery details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Gallery'
        '404':
          description: Gallery not found

  /api/metadata/v1/admin/metadata/galleries/{id}/assets:
    post:
      summary: Add assets to gallery
      tags:
        - Galleries
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddAssetsRequest'
      responses:
        '200':
          description: Assets added successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          description: Invalid request
        '500':
          description: Internal server error

  /api/metadata/v1/admin/metadata/galleries/{id}:
    put:
      summary: Update gallery
      tags:
        - Galleries
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Gallery'
      responses:
        '200':
          description: Gallery updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Gallery'
        '400':
          description: Invalid request
        '500':
          description: Internal server error

  # ==================== Catalog Service ====================
  /api/catalog/v1/catalog/home:
    get:
      summary: Get home catalog
      tags:
        - Catalog
      responses:
        '200':
          description: Home catalog with banners and sections
          content:
            application/json:
              schema:
                type: object
                properties:
                  banners:
                    type: array
                    items:
                      $ref: '#/components/schemas/CatalogContent'
                  sections:
                    type: array
                    items:
                      type: object
                      properties:
                        title:
                          type: string
                        items:
                          type: array
                          items:
                            $ref: '#/components/schemas/CatalogContent'
        '500':
          description: Internal server error

  /api/catalog/v1/catalog/contents/{short_id}:
    get:
      summary: Get content details by short_id
      tags:
        - Catalog
      parameters:
        - name: short_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Content details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogContent'
        '404':
          description: Content not found

  /api/catalog/v1/internal/catalog/sync/{short_id}:
    post:
      summary: Sync content from metadata to catalog
      tags:
        - Catalog
      parameters:
        - name: short_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Sync completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
        '500':
          description: Sync failed

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # Auth schemas
    RegisterRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    RefreshRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string

    AuthTokens:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string

    MeResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        role:
          type: string
          enum: [user, admin]

    # Content schemas
    CreateVideoRequest:
      type: object
      required:
        - title
      properties:
        title:
          type: string
        description:
          type: string
        rating:
          type: number
          format: double
        is_360:
          type: boolean
        duration_seconds:
          type: integer
        director:
          type: string

    CreateGalleryRequest:
      type: object
      required:
        - title
      properties:
        title:
          type: string
        description:
          type: string
        rating:
          type: number
          format: double

    AddAssetsRequest:
      type: object
      required:
        - assets
      properties:
        assets:
          type: array
          items:
            $ref: '#/components/schemas/AssetRequest'

    AssetRequest:
      type: object
      properties:
        asset_role:
          type: string
          enum: [thumbnail, hls_master, pdf]
        minio_key:
          type: string

    Video:
      type: object
      properties:
        id:
          type: string
          format: uuid
        short_id:
          type: string
        title:
          type: string
        description:
          type: string
        rating:
          type: number
          format: double
        is_360:
          type: boolean
        duration_seconds:
          type: integer
        director:
          type: string
        published_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        tags:
          type: array
          items:
            type: string
        assets:
          type: array
          items:
            $ref: '#/components/schemas/Asset'

    Gallery:
      type: object
      properties:
        id:
          type: string
          format: uuid
        short_id:
          type: string
        title:
          type: string
        description:
          type: string
        rating:
          type: number
          format: double
        published_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        tags:
          type: array
          items:
            type: string
        assets:
          type: array
          items:
            $ref: '#/components/schemas/Asset'

    Asset:
      type: object
      properties:
        id:
          type: string
          format: uuid
        asset_role:
          type: string
        s3_key:
          type: string
        public_url:
          type: string

    CatalogContent:
      type: object
      properties:
        id:
          type: string
        short_id:
          type: string
        type:
          type: string
          enum: [video, vr360, image_gallery, ebook]
        title:
          type: string
        description:
          type: string
        rating:
          type: number
          format: double
        metadata:
          type: object
          additionalProperties: true
        assets:
          type: object
          additionalProperties:
            type: string
        tags:
          type: array
          items:
            type: string
        updated_at:
          type: string
          format: date-time
