apiVersion: apps/v1
kind: Deployment
metadata:
  name: metadata-service
spec:
  selector:
    matchLabels:
      app: metadata-service
  template:
    metadata:
      labels:
        app: metadata-service
    spec:
      containers:
      - name: app
        image: pechka-app:latest
        args: ["metadata-service"]
        env:
        - name: PORT
          value: "8080"
        envFrom:
        - configMapRef:
            name: app-config
        - secretRef:
            name: app-secret
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: metadata-service
spec:
  selector:
    app: metadata-service
  ports:
  - port: 8080
    targetPort: 8080
