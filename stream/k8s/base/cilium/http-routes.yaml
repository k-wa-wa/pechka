apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: api-routes
spec:
  parentRefs:
  - name: cilium-gateway
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /api/catalog
    backendRefs:
    - name: catalog-service
      port: 8082
  - matches:
    - path:
        type: PathPrefix
        value: /api/v1/auth
    backendRefs:
    - name: auth-service
      port: 8081
  - matches:
    - path:
        type: PathPrefix
        value: /assets
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /assets
    backendRefs:
    - name: minio
      port: 9000
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: frontend
      port: 3000
