apiVersion: v1
kind: ConfigMap
metadata:
  name: benthos-config
  namespace: default
data:
  benthos.yaml: |
    input:
      generate:
        interval: 10s
        mapping: 'root = {}'

    pipeline:
      processors:
        - branch:
            processors:
              - cache:
                  resource: sync_checkpoint
                  operator: get
                  key: last_sync
            result_map: 'root.last_sync = content().string()'
        - bloblang: |
            root.last_sync = this.last_sync.string().trim() | "1970-01-01T00:00:00Z"

        - sql_raw:
            driver: postgres
            dsn: ${DATABASE_URL}
            query: |
              SELECT * FROM content_sync_view 
              WHERE updated_at > $1 
              ORDER BY updated_at ASC;
            args_mapping: 'root = [ this.last_sync ]'
        - unarchive:
            format: json_array
        - bloblang: |
            let id = this.id
            let assets_obj = this.assets.parse_json()
            
            root = this
            root._id = $id
            root.assets = $assets_obj
            root.metadata = {
              "director": this.director | "",
              "is_360": this.is_360 | false,
              "duration_seconds": this.duration_seconds | 0
            }
            root.director = deleted()
            root.is_360 = deleted()
            root.duration_seconds = deleted()
            root.id = deleted()
        - cache:
            resource: sync_checkpoint
            operator: set
            key: last_sync
            value: '${! this.updated_at }'

    output:
      mongodb:
        url: ${MONGODB_URI}
        database: ${MONGODB_DB}
        collection: contents
        operation: replace-one
        upsert: true
        filter_map: 'root._id = this._id'
        document_map: 'root = this'
        write_concern:
          w: "1"
          j: false

    cache_resources:
      - label: sync_checkpoint
        file:
          directory: /data
