apiVersion: v1
kind: ConfigMap
metadata:
  name: benthos-config
  namespace: default
data:
  benthos.yaml: |
    input:
      generate:
        interval: 10s
        mapping: 'root = {}'

    pipeline:
      processors:
        - branch:
            processors:
              - cache:
                  resource: sync_checkpoint
                  operator: get
                  key: last_sync
            result_map: 'root.last_sync = content().string()'
        - bloblang: |
            let checkpoint = this.last_sync.string().trim() | "1970-01-01T00:00:00Z"
            root.last_sync = if $checkpoint == "null" || $checkpoint == "" { "1970-01-01T00:00:00Z" } else { $checkpoint }

        - sql_raw:
            driver: postgres
            dsn: ${DATABASE_URL}
            query: |
              SELECT * FROM content_sync_view 
              WHERE updated_at > $1 
              ORDER BY updated_at ASC;
            args_mapping: 'root = [ this.last_sync ]'
        - bloblang: 'root = if this.type() == "array" && this.length() > 0 { this } else { deleted() }'
        - unarchive:
            format: json_array
        - bloblang: |
            let id_val = this.id | "missing-id"
            let assets_raw = this.assets | "{}"
            let assets_obj = if $assets_raw.type() == "string" { $assets_raw.parse_json() | {} } else { $assets_raw | {} }
            
            root = this
            root._id = $id_val
            root.assets = $assets_obj
            
            let t = this.tags
            root.tags = if $t == null {
              []
            } else if $t.type() == "string" {
              $t.re_replace_all("[{}]", "").split(",").filter(v -> v != "")
            } else {
              $t | []
            }
            root.metadata = {
              "director": this.director | "",
              "is_360": this.is_360 | false,
              "duration_seconds": this.duration_seconds | 0
            }
            root.director = deleted()
            root.is_360 = deleted()
            root.duration_seconds = deleted()
            root.id = deleted()
        - cache:
            resource: sync_checkpoint
            operator: set
            key: last_sync
            value: '${! this.updated_at }'

    output:
      broker:
        pattern: fan_out
        outputs:
          - mongodb:
              url: ${MONGODB_URI}
              database: ${MONGODB_DB}
              collection: contents
              operation: replace-one
              upsert: true
              filter_map: 'root._id = this._id'
              document_map: 'root = this'
              write_concern:
                w: "1"
          - elasticsearch:
              urls:
                - "${ELASTICSEARCH_URL:http://elasticsearch:9200}"
              index: contents
              id: '${! meta("es_id") }'
              action: index
            processors:
              - bloblang: |
                  meta es_id = this._id
                  root = this.without("_id")

    cache_resources:
      - label: sync_checkpoint
        file:
          directory: /data
