apiVersion: apps/v1
kind: Deployment
metadata:
  name: dev-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dev-proxy
  template:
    metadata:
      labels:
        app: dev-proxy
    spec:
      containers:
      - name: app
        image: dev-proxy:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: PORT
          value: "8080"
        - name: PROXY_TARGET
          value: "http://cilium-gateway-cilium-gateway.default.svc.cluster.local:80"
        - name: CLOUDFLARE_JWT_ISSUER
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: CLOUDFLARE_JWT_ISSUER
        - name: CLOUDFLARE_JWT_AUDIENCE
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: CLOUDFLARE_JWT_AUDIENCE
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: dev-proxy
spec:
  type: NodePort
  selector:
    app: dev-proxy
  ports:
  - name: http
    port: 8080
    targetPort: 8080
  - name: nodeport
    port: 80
    targetPort: 8080
    nodePort: 30000
