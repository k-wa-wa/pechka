kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
- role: control-plane
  extraPortMappings:
  - containerPort: 30000
    hostPort: 8000
    listenAddress: "0.0.0.0"
  - containerPort: 30001
    hostPort: 3001
    listenAddress: "0.0.0.0"
  extraMounts:
  - hostPath: ./tests/nfs_data
    containerPath: /mnt/nfs
  - hostPath: ./db/tests
    containerPath: /tests
  - hostPath: ./db/init.sql
    containerPath: /docker-init.sql
