kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
networking:
  disableDefaultCNI: true
nodes:
- role: control-plane
  image: kindest/node:v1.27.3
  extraPortMappings:
  - containerPort: 30000
    hostPort: 8000
    listenAddress: "0.0.0.0"
  extraMounts:
  - hostPath: ./tests/nfs_data
    containerPath: /mnt/nfs
  - hostPath: ./db/tests
    containerPath: /tests
  - hostPath: ./db/init.sql
    containerPath: /docker-init.sql
