services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: streaming_db
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:latest
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:alpine
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
      - ./db/tests/minio/assets:/assets-seed:ro

  mc:
    image: minio/mc
    volumes:
      - ./db/tests/minio/assets:/assets-seed:ro
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set myminio http://minio:9000 admin password123) do echo '...waiting...' && sleep 1; done;
      /usr/bin/mc mb myminio/assets || true;
      /usr/bin/mc cp -r /assets-seed/ myminio/assets/;
      /usr/bin/mc anonymous set public myminio/assets;
      exit 0;
      "

  metadata-service:
    build:
      context: ./api
      dockerfile: Dockerfile.api
    command: ["metadata-service"]
    restart: unless-stopped
    # No direct port exposure
    environment:
      - DATABASE_URL=postgres://postgres:password@db:5432/streaming_db?sslmode=disable
      - PORT=8080
      - CATALOG_SERVICE_URL=http://catalog-service:8082
    volumes:
      - ./db/tests:/tests:ro
    depends_on:
      db:
        condition: service_healthy
      batch-nfs-importer:
        condition: service_started

  sync-batch:
    build:
      context: ./api
      dockerfile: Dockerfile.api
    command: ["sync-batch"]
    environment:
      - DATABASE_URL=postgres://postgres:password@db:5432/streaming_db?sslmode=disable
      - MONGODB_URI=mongodb://mongodb:27017
      - MONGODB_DB=streaming_catalog
      - REDIS_URL=redis:6379
      - CATALOG_SERVICE_URL=http://catalog-service:8082
    depends_on:
      db:
        condition: service_healthy
      mongodb:
        condition: service_started
      redis:
        condition: service_started
      batch-nfs-importer:
        condition: service_completed_successfully
    restart: "no"

  batch-nfs-importer:
    build:
      context: ./api
      dockerfile: Dockerfile.ffmpeg
    command: ["batch-nfs-importer"]
    environment:
      - DATABASE_URL=postgres://postgres:password@db:5432/streaming_db?sslmode=disable
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=admin
      - MINIO_SECRET_KEY=password123
      - MINIO_BUCKET=assets
      - CDN_BASE_URL=/assets
      - NFS_SCAN_PATH=/mnt/nfs
      - THUMBNAIL_ANALYZER_URL=http://thumbnail-analyzer:8000
    volumes:
      - ./tests/nfs_data:/mnt/nfs:rw
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
      thumbnail-analyzer:
        condition: service_started
    restart: "no"

  thumbnail-analyzer:
    build:
      context: ./batch/thumbnail-analyzer
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./tests/nfs_data:/mnt/nfs:rw
    restart: unless-stopped


  auth-service:
    build:
      context: ./api
      dockerfile: Dockerfile.api
    command: ["auth-service"]
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgres://postgres:password@db:5432/streaming_db?sslmode=disable
      - PORT=8081
      - JWT_SECRET=supersecretkey_change_in_production
      - JWT_ACCESS_TTL_MINUTES=15
      - JWT_REFRESH_TTL_DAYS=30
    depends_on:
      db:
        condition: service_healthy
      sync-batch:
        condition: service_started

  catalog-service:
    build:
      context: ./api
      dockerfile: Dockerfile.api
    command: ["catalog-service"]
    restart: unless-stopped
    # No direct port exposure
    environment:
      - DATABASE_URL=postgres://postgres:password@db:5432/streaming_db?sslmode=disable
      - MONGODB_URI=mongodb://mongodb:27017
      - MONGODB_DB=streaming_catalog
      - REDIS_URL=redis:6379
      - PORT=8082
    depends_on:
      db:
        condition: service_healthy
      mongodb:
        condition: service_started
      redis:
        condition: service_started
      sync-batch:
        condition: service_started

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      metadata-service:
        condition: service_started
      catalog-service:
        condition: service_started

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - INTERNAL_API_URL=http://nginx:80
    depends_on:
      nginx:
        condition: service_started

volumes:
  db_data:
  mongo_data:
  minio_data:
