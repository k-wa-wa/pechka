name: CI

permissions:
  contents: read
  pull-requests: write
  packages: write

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    name: Go Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: api/go.mod
          cache-dependency-path: api/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: CGO_ENABLED=0 go build ./...

      - name: Test
        run: CGO_ENABLED=0 go test ./...

  etl-load:
    name: ETL Load (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: etl/load
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: etl/load/go.mod
          cache-dependency-path: etl/load/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: CGO_ENABLED=0 go build ./...

  etl-extract:
    name: ETL Extract (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: etl/extract
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: etl/extract/go.mod
          cache-dependency-path: etl/extract/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: CGO_ENABLED=0 go build ./...

  etl-transform:
    name: ETL Transform (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: etl/transform
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: etl/transform/go.mod
          cache-dependency-path: etl/transform/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: CGO_ENABLED=0 go build ./...

  etl-refresh-latest-playlist:
    name: ETL Refresh Latest Playlist (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: etl/refresh-latest-playlist
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: etl/refresh-latest-playlist/go.mod
          cache-dependency-path: etl/refresh-latest-playlist/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: CGO_ENABLED=0 go build ./...

  etl-thumbnail:
    name: ETL Thumbnail (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: etl/thumbnail
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: etl/thumbnail/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint
        run: python -m py_compile analyze.py

  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  frontend-vrt:
    name: Frontend VRT (Playwright)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run VRT
        run: npm run test:vrt

      - name: Upload VRT results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vrt-snapshots
          path: frontend/e2e/vrt-snapshots/
          retention-days: 14

  build-preview:
    name: Build Preview Images
    needs: [frontend, frontend-vrt]
    if: always() && needs.frontend.result == 'success' && (needs.frontend-vrt.result == 'success' || needs.frontend-vrt.result == 'failure') && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            context: ./api
            image: ghcr.io/${{ github.repository }}-api
          - name: frontend
            context: ./frontend
            image: ghcr.io/${{ github.repository }}-frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download VRT report
        uses: actions/download-artifact@v4
        if: matrix.name == 'frontend'
        with:
          name: playwright-report
          path: frontend/public/vrt-report

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ matrix.image }}:sha-${{ github.event.pull_request.head.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Comment VRT Report Link on PR
        if: matrix.name == 'frontend' && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          COMMENT_ID=$(gh api repos/${{ github.repository }}/issues/${PR_NUMBER}/comments --jq '.[] | select(.body | contains("🎭 VRT Report")) | .id' | head -n 1)
          
          COMMENT_BODY=$(cat <<EOF
          ### 🎭 VRT Report (Playwright)
          VRT の実行結果はプレビュー環境で確認できます：
          🔗 [VRT Report](https://pechka-preview-pr${PR_NUMBER}.cluster.wpc/vrt-report/)
          
          ※ UIの更新が意図通りである場合は、GitHub Actions の \`Update VRT Snapshots\` ワークフローを実行してスナップショットを更新してください。
          EOF
          )
          
          if [ -n "$COMMENT_ID" ]; then
            gh api -X PATCH repos/${{ github.repository }}/issues/comments/${COMMENT_ID} -f body="$COMMENT_BODY"
          else
            gh pr comment "$PR_NUMBER" --body "$COMMENT_BODY"
          fi


  etl-integration:
    name: ETL TL Integration Test
    runs-on: ubuntu-latest
    needs: [etl-load, etl-transform]
    steps:
      - uses: actions/checkout@v4

      - name: Generate HLS fixtures
        run: sh tests/integration/fixtures/setup.sh

      - name: Build load binary
        run: |
          docker build -t pechka/etl-load:test etl/load/

      - name: Start infrastructure (PostgreSQL + MinIO)
        run: |
          docker compose -f tests/integration/docker-compose.test.yml up -d postgres minio
          docker compose -f tests/integration/docker-compose.test.yml up minio-init

      - name: Wait for PostgreSQL
        run: |
          docker compose -f tests/integration/docker-compose.test.yml exec -T postgres \
            sh -c 'until pg_isready -U postgres; do sleep 1; done'

      - name: Apply DB migrations
        run: |
          docker compose -f tests/integration/docker-compose.test.yml exec -T \
            -e PGPASSWORD=testpass postgres \
            psql -U postgres -d pechka_test \
            < db/migrations/001_create_tables.up.sql

      - name: Run load integration test
        run: |
          docker compose -f tests/integration/docker-compose.test.yml run --rm load-integration-test

      - name: Verify results
        run: |
          docker compose -f tests/integration/docker-compose.test.yml run --no-deps --rm verify

      - name: Cleanup
        if: always()
        run: docker compose -f tests/integration/docker-compose.test.yml down -v --remove-orphans
