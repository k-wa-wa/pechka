name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    name: Go Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: api/go.mod
          cache-dependency-path: api/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: CGO_ENABLED=0 go build ./...

      - name: Test
        run: CGO_ENABLED=0 go test ./...

  etl-load:
    name: ETL Load (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: etl/load
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: etl/load/go.mod
          cache-dependency-path: etl/load/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: CGO_ENABLED=0 go build ./...

  etl-extract:
    name: ETL Extract (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: etl/extract
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: etl/extract/go.mod
          cache-dependency-path: etl/extract/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: CGO_ENABLED=0 go build ./...

  etl-transform:
    name: ETL Transform (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: etl/transform
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: etl/transform/go.mod
          cache-dependency-path: etl/transform/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: CGO_ENABLED=0 go build ./...

  etl-refresh-latest-playlist:
    name: ETL Refresh Latest Playlist (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: etl/refresh-latest-playlist
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: etl/refresh-latest-playlist/go.mod
          cache-dependency-path: etl/refresh-latest-playlist/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: CGO_ENABLED=0 go build ./...

  etl-thumbnail:
    name: ETL Thumbnail (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: etl/thumbnail
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: etl/thumbnail/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint
        run: python -m py_compile analyze.py

  etl-integration:
    name: ETL TL Integration Test
    runs-on: ubuntu-latest
    needs: [etl-load, etl-transform]
    steps:
      - uses: actions/checkout@v4

      - name: Generate HLS fixtures
        run: sh tests/integration/fixtures/setup.sh

      - name: Build load binary
        run: |
          docker build -t pechka/etl-load:test etl/load/

      - name: Start infrastructure (PostgreSQL + MinIO)
        run: |
          docker compose -f tests/integration/docker-compose.test.yml up -d postgres minio
          docker compose -f tests/integration/docker-compose.test.yml up minio-init

      - name: Wait for PostgreSQL
        run: |
          docker compose -f tests/integration/docker-compose.test.yml exec -T postgres \
            sh -c 'until pg_isready -U postgres; do sleep 1; done'

      - name: Apply DB migrations
        run: |
          docker compose -f tests/integration/docker-compose.test.yml exec -T \
            -e PGPASSWORD=testpass postgres \
            psql -U postgres -d pechka_test \
            < db/migrations/001_create_tables.up.sql

      - name: Run load integration test
        run: |
          docker compose -f tests/integration/docker-compose.test.yml run --rm load-integration-test

      - name: Verify results
        run: |
          docker compose -f tests/integration/docker-compose.test.yml run --no-deps --rm verify

      - name: Cleanup
        if: always()
        run: docker compose -f tests/integration/docker-compose.test.yml down -v --remove-orphans
