name: Release Go Binary

on:
  push:
    branches:
      - master
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Release Extract Binary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: etl/extract/go.mod
          cache-dependency-path: etl/extract/go.sum

      - name: Build extract binary
        run: |
          cd etl/extract
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o extract .

      - name: Create Release and Upload Asset (tag)
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          make_latest: true
          files: etl/extract/extract
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release and Upload Asset (latest)
        if: github.ref_type == 'branch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          make_latest: true
          files: etl/extract/extract
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
