name: ETL CI

permissions:
  contents: read

on:
  push:
    branches: [master]
    paths:
      - 'batch/**'
      - 'db/**'
      - '.github/workflows/etl-ci.yml'
  pull_request:
    paths:
      - 'batch/**'
      - 'db/**'
      - '.github/workflows/etl-ci.yml'

jobs:
  pechka-etl:
    name: Pechka ETL (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: batch/etl
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: batch/etl/go.mod
          cache-dependency-path: batch/etl/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: CGO_ENABLED=0 go build ./...

  etl-refresh-latest-playlist:
    name: ETL Refresh Latest Playlist (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: batch/refresh-latest-playlist
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: batch/refresh-latest-playlist/go.mod
          cache-dependency-path: batch/refresh-latest-playlist/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: CGO_ENABLED=0 go build ./...

  etl-generate-thumbnail:
    name: ETL Generate Thumbnail (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: batch/generate-thumbnail
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: batch/generate-thumbnail/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint
        run: python -m py_compile analyze.py


