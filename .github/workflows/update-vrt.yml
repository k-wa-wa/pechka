name: Update VRT Snapshots

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-snapshots:
    name: Update Playwright VRT Snapshots
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Update Snapshots
        run: npm run test:vrt:update

      - name: Commit and push updated snapshots
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add e2e/vrt-snapshots/
          if git diff --cached --quiet; then
            echo "No changes in VRT snapshots."
          else
            git commit -m "chore: update VRT snapshots [skip ci]"
            git push
          fi
