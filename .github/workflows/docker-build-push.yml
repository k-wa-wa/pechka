name: Build and Push Docker Images

on:
  push:
    branches:
      - master

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            context: ./api
            image: ghcr.io/${{ github.repository }}-api
          - name: frontend
            context: ./frontend
            image: ghcr.io/${{ github.repository }}-frontend
          - name: etl-transform
            context: .
            file: ./batch/etl/Dockerfile.transform
            image: ghcr.io/${{ github.repository }}/etl-transform
          - name: etl-load
            context: .
            file: ./batch/etl/Dockerfile.load
            image: ghcr.io/${{ github.repository }}/etl-load
          - name: etl-generate-thumbnail
            context: ./batch/generate-thumbnail
            image: ghcr.io/${{ github.repository }}/etl-generate-thumbnail
          - name: etl-refresh-latest-playlist
            context: ./batch/refresh-latest-playlist
            image: ghcr.io/${{ github.repository }}/etl-refresh-latest-playlist

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: |
            ${{ matrix.image }}:latest
            ${{ matrix.image }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
