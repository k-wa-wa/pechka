name: Production CI

on:
  push:
    branches:
      - master
    paths:
      - stream/api/**/*

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Backend API
        uses: docker/build-push-action@v5
        with:
          push: true
          context: ./stream/api
          file: ./stream/api/Dockerfile.api
          tags: ghcr.io/k-wa-wa/pechka-stream-api:latest,ghcr.io/k-wa-wa/pechka-stream-api:${{ github.sha }}

      - name: Build and push Importer
        uses: docker/build-push-action@v5
        with:
          push: true
          context: ./stream/api
          file: ./stream/api/Dockerfile.ffmpeg
          tags: ghcr.io/k-wa-wa/pechka-stream-importer:latest,ghcr.io/k-wa-wa/pechka-stream-importer:${{ github.sha }}
